<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Battle Royale — Dindon Design</title>
<style>
  :root {
    --bg-color: #0d0d0d;
    --neon-blue: #4488ff;
    --neon-green: #44cc44;
    --neon-pink: #ff55aa;
    --neon-yellow: #ffcc00;
    --text-color: #e0e0e0;
    --font-main: 'Courier New', monospace;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    font-family: var(--font-main);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
  }
  
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px 30px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid #333;
    border-radius: 8px;
  }
  
  .player-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 20px;
    border-radius: 6px;
    min-width: 140px;
  }
  
  .player-panel h3 { margin: 0 0 5px 0; font-size: 14px; text-transform: uppercase; }
  .player-panel .score { font-size: 28px; font-weight: bold; }
  .player-panel.dead { opacity: 0.4; }
  
  .player-1 { border: 2px solid var(--neon-blue); }
  .player-1 h3, .player-1 .score { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
  
  .player-2 { border: 2px solid var(--neon-green); }
  .player-2 h3, .player-2 .score { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
  
  .player-3 { border: 2px solid var(--neon-pink); }
  .player-3 h3, .player-3 .score { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
  
  .player-4 { border: 2px solid var(--neon-yellow); }
  .player-4 h3, .player-4 .score { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow); }
  
  #gameCanvas {
    border: 3px solid #222;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
  }
  
  #overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(0, 0, 0, 0.9);
    padding: 40px 60px;
    border-radius: 12px;
    border: 2px solid #444;
  }
  
  #overlay h1 { font-size: 42px; color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); margin-bottom: 20px; }
  #overlay p { font-size: 18px; margin: 10px 0; }
  #overlay .controls { font-size: 14px; color: #888; margin-top: 20px; }
  .blink { animation: blink 1s infinite; }
  
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="game-container">
  <div class="scoreboard" id="scoreboard">
    <div class="player-panel player-1" id="p1-panel">
      <h3>J1 WASD</h3>
      <span class="score" id="score1">0</span>
    </div>
    <div class="player-panel player-2" id="p2-panel">
      <h3>J2 Flèches</h3>
      <span class="score" id="score2">0</span>
    </div>
  </div>
  
  <canvas id="gameCanvas"></canvas>
</div>

<div id="overlay">
  <h1>SNAKE BATTLE</h1>
  <p>2-4 JOUEURS</p>
  <p class="blink">APPUYEZ SUR 2, 3 OU 4 POUR COMENCER</p>
  <div class="controls">
    J1: W A S D &nbsp;|&nbsp; J2: Flèches &nbsp;|&nbsp; J3: IJKL &nbsp;|&nbsp; J4: Numpad
  </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const GRID_W = 48;
const GRID_H = 32;
const CELL = 16;

canvas.width = GRID_W * CELL;
canvas.height = GRID_H * CELL;

const DIRECTIONS = {
  UP: { x: 0, y: -1 },
  DOWN: { x: 0, y: 1 },
  LEFT: { x: -1, y: 0 },
  RIGHT: { x: 1, y: 0 }
};

const PLAYER_CONFIGS = [
  // AZERTY key codes for ZQSV: Z=KeyW, Q=KeyA, S=KeyS, V=KeyD
  { name: "J1", color: "#4488ff", colorLight: "#77bbff", keys: { up: "KeyW", left: "KeyA", down: "KeyS", right: "KeyD" } },
  { name: "J2", color: "#44cc44", colorLight: "#77ff77", keys: { up: "ArrowUp", left: "ArrowLeft", down: "ArrowDown", right: "ArrowRight" } },
  { name: "J3", color: "#ff55aa", colorLight: "#ff88cc", keys: { up: "KeyI", left: "KeyJ", down: "KeyK", right: "KeyL" } },
  { name: "J4", color: "#ffcc00", colorLight: "#ffee55", keys: { up: "Numpad8", left: "Numpad4", down: "Numpad5", right: "Numpad6" } }
];

let gameState = "menu";
let playerCount = 2;
let snakes = [];
let foods = [];
let particles = [];
let scores = [];
let MOVE_INTERVAL = 100;
let moveTimer = 0;
let lastTime = 0;
let deathMessages = [];

const keysPressed = {};

document.addEventListener("keydown", (e) => {
  keysPressed[e.code] = true;
  e.preventDefault();
  
  if (gameState === "menu") {
    if (e.code === "Digit2" || e.code === "Numpad2") { playerCount = 2; startGame(); }
    if (e.code === "Digit3" || e.code === "Numpad3") { playerCount = 3; startGame(); }
    if (e.code === "Digit4" || e.code === "Numpad4") { playerCount = 4; startGame(); }
  }
  
  if (gameState === "gameover") {
    if (e.code === "Enter" || e.code === "Space") { gameState = "menu"; showOverlay(); }
  }
});

document.addEventListener("keyup", (e) => keysPressed[e.code] = false);

function showOverlay() {
  const overlay = document.getElementById("overlay");
  overlay.classList.remove("hidden");
  const p = playerCount > 2 ? `${playerCount} JOUEURS` : "2 JOUEURS";
  overlay.innerHTML = `
    <h1>SNAKE BATTLE</h1>
    <p>${p}</p>
    <p class="blink">APPUYEZ SUR 2, 3 OU 4 POUR COMMENCER</p>
    <div class="controls">J1: W A S D &nbsp;|&nbsp; J2: Flèches &nbsp;|&nbsp; J3: IJKL &nbsp;|&nbsp; J4: Numpad</div>
  `;
}

function hideOverlay() {
  document.getElementById("overlay").classList.add("hidden");
}

function createSnake(config, startX, startY, startDir, index) {
  const body = [];
  for (let i = 0; i < 3; i++) {
    body.push({ x: startX - startDir.x * i, y: startY - startDir.y * i });
  }
  return {
    body, direction: startDir, nextDirection: startDir,
    color: config.color, colorLight: config.colorLight,
    name: config.name, alive: true, score: 0, growQueue: 0,
    config: config, index
  };
}

function startGame() {
  gameState = "playing";
  moveTimer = MOVE_INTERVAL;  // Force move on next tick
  snakes = [];
  foods = [];
  particles = [];
  deathMessages = [];
  scores = [];
  
  const spawns = [
    { x: 5, y: Math.floor(GRID_H/2), dir: DIRECTIONS.RIGHT },
    { x: GRID_W-6, y: Math.floor(GRID_H/2), dir: DIRECTIONS.LEFT },
    { x: Math.floor(GRID_W/2), y: 5, dir: DIRECTIONS.DOWN },
    { x: Math.floor(GRID_W/2), y: GRID_H-6, dir: DIRECTIONS.UP }
  ];
  
  for (let i = 0; i < playerCount; i++) {
    snakes.push(createSnake(PLAYER_CONFIGS[i], spawns[i].x, spawns[i].y, spawns[i].dir, i));
    scores.push(0);
  }
  
  for (let i = 0; i < 10; i++) spawnFood();
  
  hideOverlay();
  updateScoreboard();
}

function spawnFood() {
  let attempts = 0;
  while (attempts < 50) {
    const x = Math.floor(Math.random() * GRID_W);
    const y = Math.floor(Math.random() * GRID_H);
    let blocked = false;
    
    for (const s of snakes) {
      if (!s.alive) continue;
      for (const seg of s.body) {
        if (seg.x === x && seg.y === y) { blocked = true; break; }
      }
    }
    if (!blocked) {
      foods.push({ x, y, value: 1, special: Math.random() < 0.15, pulse: Math.random() * Math.PI * 2 });
      return;
    }
    attempts++;
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x: x * CELL + CELL/2, y: y * CELL + CELL/2,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1.0, decay: 0.02 + Math.random() * 0.02, color, size: 2 + Math.random() * 4
    });
  }
}

function handleInput() {
  for (const snake of snakes) {
    if (!snake.alive) continue;
    const k = snake.config.keys;
    if (!k) continue;
    
    if (keysPressed[k.up] && snake.direction !== DIRECTIONS.DOWN) snake.nextDirection = DIRECTIONS.UP;
    else if (keysPressed[k.down] && snake.direction !== DIRECTIONS.UP) snake.nextDirection = DIRECTIONS.DOWN;
    else if (keysPressed[k.left] && snake.direction !== DIRECTIONS.RIGHT) snake.nextDirection = DIRECTIONS.LEFT;
    else if (keysPressed[k.right] && snake.direction !== DIRECTIONS.LEFT) snake.nextDirection = DIRECTIONS.RIGHT;
  }
}

function moveSnakes() {
  for (const snake of snakes) {
    if (!snake.alive) continue;
    snake.direction = snake.nextDirection;
    
    const head = snake.body[0];
    const newHead = { x: head.x + snake.direction.x, y: head.y + snake.direction.y };
    
    if (newHead.x < 0 || newHead.x >= GRID_W || newHead.y < 0 || newHead.y >= GRID_H) {
      killSnake(snake, "mur");
      continue;
    }
    
    for (let i = 1; i < snake.body.length; i++) {
      if (snake.body[i].x === newHead.x && snake.body[i].y === newHead.y) {
        killSnake(snake, "soi-même");
        break;
      }
    }
    if (!snake.alive) continue;
    
    let ate = false;
    for (let i = foods.length - 1; i >= 0; i--) {
      if (foods[i].x === newHead.x && foods[i].y === newHead.y) {
        snake.score += foods[i].value;
        snake.growQueue += foods[i].value;
        spawnParticles(foods[i].x, foods[i].y, foods[i].special ? "#ffdd44" : "#44ff44", foods[i].special ? 12 : 6);
        foods.splice(i, 1);
        ate = true;
      }
    }
    
    if (!ate && snake.growQueue <= 0) snake.body.pop();
    snake.growQueue = Math.max(0, snake.growQueue - 1);
    snake.body.unshift(newHead);
  }
}

function checkCollisions() {
  const alive = snakes.filter(s => s.alive);
  
  for (let i = 0; i < alive.length; i++) {
    for (let j = i + 1; j < alive.length; j++) {
      if (alive[i].body[0].x === alive[j].body[0].x && alive[i].body[0].y === alive[j].body[0].y) {
        killSnake(alive[i], "collision");
        killSnake(alive[j], "collision");
        continue;
      }
      
      for (let k = 1; k < alive[j].body.length; k++) {
        if (alive[i].body[0].x === alive[j].body[k].x && alive[i].body[0].y === alive[j].body[k].y) {
          killSnake(alive[i], "corps");
        }
      }
      if (!alive[i].alive) continue;
      
      for (let k = 1; k < alive[i].body.length; k++) {
        if (alive[j].body[0].x === alive[i].body[k].x && alive[j].body[0].y === alive[i].body[k].y) {
          killSnake(alive[j], "corps");
        }
      }
    }
  }
}

function killSnake(snake, reason) {
  if (!snake.alive) return;
  snake.alive = false;
  
  for (let i = 0; i < snake.body.length; i += 2) {
    spawnParticles(snake.body[i].x, snake.body[i].y, snake.color, 2);
  }
  
  deathMessages.push({ text: `${snake.name} dead (${reason})`, color: snake.color, time: Date.now(), life: 2.5 });
  
  const alive = snakes.filter(s => s.alive).length;
  if (alive <= 1) {
    setTimeout(() => { gameState = "gameover"; showWinner(); }, 1200);
  }
}

function showWinner() {
  const alive = snakes.filter(s => s.alive);
  const winner = alive.length > 0 ? alive[0] : null;
  const overlay = document.getElementById("overlay");
  
  if (winner) {
    overlay.innerHTML = `
      <h1 style="color:${winner.color}">${winner.name} WIN!</h1>
      <p>Score: ${winner.score}</p>
      <p class="blink">APPUYEZ SUR ESPACE</p>
    `;
  } else {
    overlay.innerHTML = `<h1>DRAW!</h1><p class="blink">APPUYEZ SUR ESPACE</p>`;
  }
  overlay.classList.remove("hidden");
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  deathMessages = deathMessages.filter(d => {
    d.life -= dt / 1000;
    return d.life > 0;
  });
}

function updateScoreboard() {
  for (let i = 0; i < 4; i++) {
    const panel = document.getElementById(`p${i+1}-panel`);
    const scoreEl = document.getElementById(`score${i+1}`);
    if (i < playerCount && snakes[i]) {
      scoreEl.textContent = snakes[i].score;
      panel.classList.toggle("dead", !snakes[i].alive);
    } else {
      panel.classList.add("dead");
      scoreEl.textContent = "-";
    }
  }
}

function draw() {
  ctx.fillStyle = "#0d0d0d";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.strokeStyle = "#1a1a1a";
  ctx.lineWidth = 1;
  for (let x = 0; x <= GRID_W; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= GRID_H; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }
  
  for (const f of foods) {
    const pulse = 0.8 + Math.sin(Date.now() / 200 + f.pulse) * 0.2;
    ctx.fillStyle = f.special ? "#ffdd44" : "#44ff44";
    ctx.fillRect(f.x * CELL + 2, f.y * CELL + 2, CELL - 4, CELL - 4);
  }
  
  for (const s of snakes) {
    if (!s.alive) continue;
    for (let i = 0; i < s.body.length; i++) {
      ctx.fillStyle = i === 0 ? s.colorLight : s.color;
      ctx.fillRect(s.body[i].x * CELL + 1, s.body[i].y * CELL + 1, CELL - 2, CELL - 2);
    }
  }
  
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  
  if (gameState === "playing") {
    moveTimer += dt;
    if (moveTimer >= MOVE_INTERVAL) {
      moveTimer = 0;
      handleInput();
      moveSnakes();
      checkCollisions();
      
      if (foods.length < 10) spawnFood();
      updateScoreboard();
    }
  }
  
  updateParticles(dt);
  draw();
  
  requestAnimationFrame(gameLoop);
}

showOverlay();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
